syntax = "proto3";
package llama_infer;

message Config {
  int32 dim        = 1;
  int32 hidden_dim = 2;
  int32 num_layers = 3;
  int32 num_heads  = 4;
  int32 n_kv_heads = 5;
  int32 vocab_size = 6;
  int32 seq_len    = 7;
}

message TokenizerData {
  repeated string vocab    = 1;
  repeated float  scores   = 2;
  int32           vocab_sized    = 3;
  int32           max_token_len  = 4;
}